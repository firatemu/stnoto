name: Production CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sudo mkdir -p /var/www/stnoto
            sudo chown -R "$USER:$USER" /var/www/stnoto
            cd /var/www/stnoto
            export COMPOSE_PROJECT_NAME=stnoto
            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            if [ ! -d repo/.git ]; then
              git clone --depth 1 -b "${{ github.ref_name }}" "$REPO_URL" repo
            fi
            cd repo
            git fetch origin "${{ github.ref_name }}" && git reset --hard "origin/${{ github.ref_name }}"
            if [ -f ../.env ] && [ ! -f .env ]; then
              ln -s ../.env .env
            fi
            docker compose -p stnoto -f docker-compose.prod.yml pull postgres redis minio caddy
            docker compose -p stnoto -f docker-compose.prod.yml build backend
            docker compose -p stnoto -f docker-compose.prod.yml build frontend
            docker compose -p stnoto -f docker-compose.prod.yml up -d
            docker image prune -f
