name: Production CD (Docker Image via GHCR)

on:
  push:
    branches:
      - main # main dalına (branch) kod itildiğinde otomatik çalışır. (İsterseniz workflow_dispatch ekleyebilirsiniz)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend (NestJS)
        uses: docker/build-push-action@v5
        with:
          context: ./api-stage/server
          file: ./api-stage/server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend (Next.js)
        uses: docker/build-push-action@v5
        with:
          context: ./panel-stage/client
          file: ./panel-stage/client/Dockerfile.staging.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Production Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}       # Github Secrets üzerinden sunucu IP'si
          username: ${{ secrets.VPS_USERNAME }}   # Sunucu kullanıcı adı (örn: root)
          key: ${{ secrets.VPS_SSH_KEY }}     # Sunucu SSH Private Key
          script: |
            echo "🚀 Sunucu Hazırlanıyor..."
            sudo mkdir -p /var/www/otomuhasebe
            sudo chown -R $USER:$USER /var/www/otomuhasebe
            cd /var/www/otomuhasebe
            
            echo "📦 Docker Compose Yapılandırması Güncelleniyor..."
            cat << 'EOF' > docker-compose.prod.yml
version: '3.8'
services:
  backend:
    image: ghcr.io/firatemu/stnoto-backend:latest
    container_name: otomuhasebe-api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3020
    env_file:
      - .env
    ports:
      - "3020:3020"
    networks:
      - app-network

  frontend:
    image: ghcr.io/firatemu/stnoto-frontend:latest
    container_name: otomuhasebe-client
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3010
    env_file:
      - .env
    ports:
      - "3010:3010"
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
EOF

            echo "🔑 GitHub Container Registry Girişi Yapılıyor..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "📥 Yeni İmajlar Çekiliyor..."
            docker-compose -f docker-compose.prod.yml pull
            
            echo "⬆️ Servisler Yeniden Başlatılıyor..."
            docker-compose -f docker-compose.prod.yml up -d
            
            echo "🧹 Sistem Temizleniyor..."
            docker image prune -f
            echo "✅ Dağıtım Başarıyla Tamamlandı!"
