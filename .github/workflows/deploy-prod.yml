name: Production CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: firatemu/stnoto

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend (NestJS)
        uses: docker/build-push-action@v5
        with:
          context: ./api-stage/server
          file: ./api-stage/server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend (Next.js)
        uses: docker/build-push-action@v5
        with:
          context: ./panel-stage/client
          file: ./panel-stage/client/Dockerfile.staging.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/stnoto
            sudo chown -R $USER:$USER /var/www/stnoto
            cd /var/www/stnoto
            
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: ghcr.io/firatemu/stnoto-backend:latest
                container_name: stnoto-api
                restart: always
                environment:
                  - NODE_ENV=production
                  - PORT=3020
                env_file:
                  - .env
                ports:
                  - "3020:3020"
                networks:
                  - app-network

              frontend:
                image: ghcr.io/firatemu/stnoto-frontend:latest
                container_name: stnoto-client
                restart: always
                environment:
                  - NODE_ENV=production
                  - PORT=3010
                env_file:
                  - .env
                ports:
                  - "3010:3010"
                networks:
                  - app-network
                depends_on:
                  - backend

            networks:
              app-network:
                driver: bridge
            EOF

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker-compose pull
            docker-compose up -d
            docker image prune -f
