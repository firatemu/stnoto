networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

services:
  caddy:
    image: caddy:2
    container_name: otomuhasebe-caddy
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ACME_AGREE=true
    # healthcheck: DISABLED (geçici - staging container'ları başlatmak için)
    # test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:80"]
    # interval: 30s
    # timeout: 10s
    # retries: 3
    # start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: otomuhasebe-postgres
    restart: unless-stopped
    mem_limit: 384m
    cpus: "0.5"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: IKYYJ1R8fUZ3PItqxf6qel12VNbLYiOe
      POSTGRES_DB: otomuhasebe_stage
      TZ: Europe/Istanbul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres"]
      interval: 30s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: otomuhasebe-redis
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.25"
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: otomuhasebe-minio
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.25"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BROWSER: "off"  # Disable public console access
    volumes:
      - /opt/minio-data:/data  # Host bind mount (persists even if container is removed)
    ports:
      - "127.0.0.1:9000:9000"  # API (localhost only, not exposed to internet)
      - "127.0.0.1:9001:9001"  # Console (localhost only, for admin access)
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
