version: "3.9"

services:
  backend-staging:
    build:
      context: ../../api-stage
      dockerfile: server/Dockerfile.staging.prod
    env_file:
      - .env.staging
    networks: [ app_net ]
    ports:
      - "3020:3000"
    mem_limit: 512m
    cpus: "0.75"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://0.0.0.0:3000/api/health" ]
      interval: 30s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  user-panel-staging:
    build:
      context: ../../panel-stage/client
      dockerfile: Dockerfile.staging.prod
    ports:
      - "3010:3000"
    env_file:
      - .env.staging
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_BASE_URL: https://staging-api.otomuhasebe.com
      NODE_ENV: production
      API_PROXY_TARGET: "http://backend-staging:3000"
      NODE_OPTIONS: "--max-old-space-size=1536"
    mem_limit: 2048m
    cpus: "1.5"
    networks: [ app_net ]
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://0.0.0.0:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

networks:
  app_net:
    name: otomuhasebe_app_net
    external: true
