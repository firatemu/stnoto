# Oto Muhasebe sunucu RAM optimizasyonu
# Kurulum: sudo cp docker/scripts/99-otomuhasebe-ram.conf /etc/sysctl.d/ && sudo sysctl -p /etc/sysctl.d/99-otomuhasebe-ram.conf

# Swap kullanımını azalt (0–100, düşük = RAM’i tercih et)
vm.swappiness=10

# Inode/dentry önbelleğini daha çabuk geri ver (varsayılan 100, yükseltince RAM tasarrufu)
vm.vfs_cache_pressure=80

# OOM’da agresif temizlik (opsiyonel, 1 = sadece overcommit izni)
# vm.overcommit_memory=0
