# HOT RELOAD / DEV CONFIGURATION
# Usage: docker compose -f docker-compose.base.yml -f docker-compose.staging.dev.yml up -d
# Migration: docker compose -f docker-compose.base.yml -f docker-compose.staging.dev.yml run --rm migrate-staging

services:
  migrate-staging:
    build:
      context: ./api-stage
      dockerfile: server/Dockerfile.migrate
    env_file:
      - .env.staging
    networks: [ app_net ]

  backend-staging:
    build:
      context: ./api-stage
      dockerfile: server/Dockerfile.staging.prod
    env_file:
      - .env.staging
    networks: [ app_net ]
    volumes:
      # Proje içi uploads klasörü - Docker yeniden başlasa da logo/dosyalar kalır
      - ./api-stage/server/uploads:/app/server/uploads
    ports:
      - "3020:3000"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://0.0.0.0:3000/api/health" ]
      interval: 30s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped
  user-panel-staging:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3010:3000"
    env_file:
      - .env.staging
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      # Docker/Linux'ta hot reload için polling (dosya değişiklikleri algılansın)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # Panel /api/* isteklerini backend container'a yönlendirir (Compose servis adı)
      API_PROXY_TARGET: "http://backend-staging:3000"
    volumes:
      - ./panel-stage/client:/app
      - panel_stage_node_modules:/app/node_modules
      - panel_stage_next_cache:/app/.next
    command: sh -c "corepack enable && pnpm install && pnpm dev:fast"
    networks: [ app_net ]
    depends_on:
      - backend-staging
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/login" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  api_stage_node_modules:
  api_stage_uploads:
  panel_stage_node_modules:
  panel_stage_next_cache:
