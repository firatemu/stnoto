server {
    listen 80;
    server_name stnoto.com www.stnoto.com;

    # GZIP & Brotli Sıkıştırması (CPU ile Bandwidth kazancı)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # Optimizasyon/Hız dengesi (1-9 arası)
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Statik klasör için Max Cache
    location /_next/static/ {
        proxy_pass http://localhost:3010;
        proxy_cache_valid 200 365d;
        expires max;
        access_log off;
    }

    # Public dosyalar (Resim, ikon)
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        proxy_pass http://localhost:3010;
        expires 30d;
        access_log off;
    }

    # Next.js - Frontend (Kalan Trafik)
    location / {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API - Backend (NestJS) Trafik Yönlendirme
    location /api/ {
        proxy_pass http://localhost:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
